<!DOCTYPE html>
<html>
<head>
    <title>Invoice Ready!</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; border-radius: 12px; padding: 40px; text-align: center; box-shadow: 0 2px 15px rgba(0,0,0,0.1); max-width: 400px; width: 90%; }
        .check { font-size: 60px; }
        h2 { color: #2ecc71; margin: 15px 0 5px; }
        p { color: #666; margin: 5px 0; }
        .total { font-size: 24px; font-weight: bold; color: #333; margin: 15px 0; }
        .btn { display: block; padding: 13px; border-radius: 8px; text-decoration: none; margin: 10px 0; font-size: 15px; font-weight: bold; }
        .whatsapp { background: #25D366; color: white; }
        .download { background: #3498db; color: white; }
        .new { background: #f0f2f5; color: #333; }
        .list { background: #f0f2f5; color: #333; }
    </style>
</head>
<body>
    <div class="card">
        <div class="check">✅</div>
        <h2>Invoice Bani!</h2>
        <p>{{ customer_name }} ke liye</p>
        <div class="total">Rs. {{ "%.2f"|format(total) }}</div>
        <a href="{{ whatsapp_url }}" target="_blank" class="btn whatsapp">📱 WhatsApp pe Bhejo</a>
        <a href="/download/{{ invoice_no }}" class="btn download">⬇️ PDF Download Karo</a>
        <a href="/" class="btn new">+ Nayi Invoice</a>
        <a href="/invoices" class="btn list">📋 Saari Invoices</a>
    </div>
</body>
</html>
